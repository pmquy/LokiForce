apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/quymk1/gitops-infra.git'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
