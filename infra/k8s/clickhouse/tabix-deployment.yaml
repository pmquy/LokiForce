apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabix
  namespace: observability
  labels:
    app: tabix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tabix
  template:
    metadata:
      labels:
        app: tabix
    spec:
      containers:
        - name: tabix
          image: cloki/tabix:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "32Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tabix
  namespace: observability
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: tabix
  type: ClusterIP
