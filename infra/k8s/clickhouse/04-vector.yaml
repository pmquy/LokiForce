apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-logs
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-logs
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: observability
data:
  vector.toml: |
    # 1. Source: Thu thập log từ tất cả các Container trong K8s
    [sources.k8s_logs]
    type = "kubernetes_logs"

    # 2. Transform: Parse log JSON để khớp chính xác cấu trúc otel_logs của ClickHouse
    [transforms.parse_logs]
    type = "remap"
    inputs = ["k8s_logs"]
    source = '''
    # Khởi tạo các cột cơ bản cho otel_logs
    .ServiceName = .kubernetes.container_name || "unknown-service"
    .Body = .message || ""
    .SeverityText = "INFO"
    .SeverityNumber = 9
    .TraceId = ""
    .SpanId = ""
    .TraceFlags = 0
    .ResourceSchemaUrl = ""
    .ResourceAttributes = {}
    .ScopeSchemaUrl = ""
    .ScopeName = ""
    .ScopeVersion = ""
    .ScopeAttributes = {}
    .LogAttributes = {}

    # Thử parse message dưới dạng JSON (logs của Gin/Slog)
    if .message != null {
      parsed, err = parse_json(.message)
      if err == null {
        .Body = parsed.msg || parsed.message || .message
        .SeverityText = parsed.level || "INFO"
        
        # Đồng bộ TraceId và SpanId
        if parsed.trace_id != null {
          .TraceId = string!(parsed.trace_id)
        }
        if parsed.span_id != null {
          .SpanId = string!(parsed.span_id)
        }
        
        # Ánh xạ SeverityNumber dựa trên Level
        if parsed.level == "ERROR" || parsed.level == "FATAL" {
          .SeverityNumber = 17
        } else if parsed.level == "WARN" {
          .SeverityNumber = 13
        } else if parsed.level == "DEBUG" {
          .SeverityNumber = 5
        }
        
        # Lưu các trường JSON còn lại vào LogAttributes để không bị mất thông tin
        # Xóa các trường đã trích xuất khỏi parsed để tránh lặp
        del(parsed.msg)
        del(parsed.message)
        del(parsed.level)
        del(parsed.trace_id)
        del(parsed.span_id)
        del(parsed.time)
        
        # Map các trường khác sang LogAttributes
        for_each(object(parsed) ?? {}) -> |key, value| {
          .LogAttributes = set!(.LogAttributes, [key], to_string(value) ?? "")
        }
      }
    }
    
    # Định dạng Timestamp khớp với kiểu DateTime64(9) của ClickHouse
    .Timestamp = format_timestamp!(.timestamp, format: "%Y-%m-%d %H:%M:%S%.9f")
    '''

    # 3. Sink: Đẩy trực tiếp vào bảng otel_logs của ClickHouse
    [sinks.clickhouse_out]
    type = "clickhouse"
    inputs = ["parse_logs"]
    endpoint = "http://clickhouse.observability.svc:8123"
    database = "lokiforce"
    table = "otel_logs"
    skip_unknown_fields = true
    date_time_best_effort = true
    
    # Cấu hình Basic Authentication
    auth.strategy = "basic"
    auth.user = "clickhouse"
    auth.password = "clickhouse123"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: observability
  labels:
    app: vector
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.56.0-alpine
          args: ["--config", "/etc/vector/vector.toml"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/vector
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdocker
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdocker
          hostPath:
            path: /var/lib/docker/containers
