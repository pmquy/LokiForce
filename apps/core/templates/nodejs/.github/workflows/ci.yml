name: Build and Deploy (GitOps)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: {{"${{ github.actor }}"}}
          password: {{"${{ secrets.GITHUB_TOKEN }}"}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/{{.Owner}}/{{.ServiceName}}:latest
            ghcr.io/{{.Owner}}/{{.ServiceName}}:{{"${{ github.sha }}"}}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: {{.Owner}}/{{.GitOpsRepo}}
          token: {{"${{ secrets.GITOPS_PAT }}"}}
          path: gitops-infra

      - name: Update Image Tag in Manifest
        run: |
          cd gitops-infra/manifests/{{.ServiceName}}
          if [ -f "kustomization.yaml" ]; then
            kustomize edit set image ghcr.io/{{.Owner}}/{{.ServiceName}}=ghcr.io/{{.Owner}}/{{.ServiceName}}:{{"${{ github.sha }}"}}
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add kustomization.yaml
            git commit -m "chore(gitops): update image tag for {{.ServiceName}} to {{"${GITHUB_SHA::7}"}}"
            git push
          else
            echo "Error: kustomization.yaml not found"
            exit 1
          fi
