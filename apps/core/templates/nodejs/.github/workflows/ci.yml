name: Build and Push (CI)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: {{"${{ github.actor }}"}}
          password: {{"${{ secrets.GITHUB_TOKEN }}"}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/{{.Owner}}/{{.ServiceName}}:latest
            ghcr.io/{{.Owner}}/{{.ServiceName}}:{{"${{ github.sha }}"}}

      - name: Checkout GitOps Infra Repository
        uses: actions/checkout@v4
        with:
          repository: {{.Owner}}/{{.GitOpsRepo}}
          token: {{"${{ secrets.GITOPS_GIT_TOKEN }}"}}
          path: gitops-infra

      - name: Update Image Tag in GitOps Manifest
        run: |
          cd gitops-infra
          yq -i '(.images[] | select(.name == "ghcr.io/{{.Owner}}/{{.ServiceName}}") | .newTag) = "{{"${{ github.sha }}"}}"' manifests/{{.ServiceName}}/kustomization.yaml
          git config --global user.name "LokiForce CI Bot"
          git config --global user.email "ci-bot@lokiforce.com"
          git add manifests/{{.ServiceName}}/kustomization.yaml
          git commit -m "deploy: update image tag for {{.ServiceName}} to {{"${{ github.sha }}"}} [skip ci]" || exit 0
          git push
