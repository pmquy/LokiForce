apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.ServiceName}}
  namespace: production
  labels:
    app: {{.ServiceName}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{.ServiceName}}
  template:
    metadata:
      labels:
        app: {{.ServiceName}}
    spec:
      containers:
        - name: app
          image: ghcr.io/{{.Owner}}/{{.ServiceName}}:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
